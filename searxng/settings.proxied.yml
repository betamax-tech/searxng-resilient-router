use_default_settings: true

general:
  instance_name: "BetaMax Search"
  debug: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  # Retry across engines within a single search before giving up — improves
  # resilience when an engine transiently 403s / CAPTCHAs.
  max_page: 0
  formats:
    - html
    - json
  # Fast engine recovery — see settings.yml for rationale.
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 300
    SearxEngineCaptcha: 300
    SearxEngineTooManyRequests: 300
    cf_SearxEngineCaptcha: 600
    cf_SearxEngineAccessDenied: 300
    recaptcha_SearxEngineCaptcha: 600

server:
  secret_key: "OVERRIDDEN_BY_SEARXNG_SECRET_ENV"
  limiter: false
  image_proxy: true
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true
  default_theme: simple
  theme_args:
    simple_style: dark

engines:
  # All rotation engines enabled; router targets subsets via engines= per query.
  # See settings.yml for the index-family rationale.
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: yandex
    engine: yandex
    shortcut: yx
    disabled: false

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mjk
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: true

  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: true

  - name: github
    engine: github
    shortcut: gh
    disabled: true


