use_default_settings: true

general:
  instance_name: "BetaMax Search"
  debug: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  # Retry across engines within a single search before giving up — improves
  # resilience when an engine transiently 403s / CAPTCHAs.
  max_page: 0
  formats:
    - html
    - json

server:
  secret_key: "OVERRIDDEN_BY_SEARXNG_SECRET_ENV"
  limiter: false
  image_proxy: true
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true
  default_theme: simple
  theme_args:
    simple_style: dark

engines:
  # Google is the most reliable general engine from this host's datacenter IP
  # (returns relevant results, no CAPTCHA blocking as of the current image).
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp

  - name: github
    engine: github
    shortcut: gh

  # --- Disabled: unreliable from this host ---
  # bing: parser returns query-irrelevant noise in the current image.
  - name: bing
    engine: bing
    shortcut: b
    disabled: true

  # These CAPTCHA / access-deny this host's datacenter IP. Reachable via !bang if ever needed.
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: true

  - name: brave
    engine: brave
    shortcut: br
    disabled: true

  - name: mojeek
    engine: mojeek
    shortcut: mjk
    disabled: true


