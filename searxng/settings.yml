use_default_settings: true

general:
  instance_name: "BetaMax Search"
  debug: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  # Retry across engines within a single search before giving up — improves
  # resilience when an engine transiently 403s / CAPTCHAs.
  max_page: 0
  formats:
    - html
    - json
  # Recover suspended engines FAST. Defaults suspend an engine for ~1h on 429
  # and 24h on CAPTCHA/access-denied — which, with few enabled engines, causes
  # total failure after a burst (e.g. extended_research fan-out). Shorten these
  # so a transient block doesn't take an engine offline for the whole session.
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 300      # was 86400 (24h)
    SearxEngineCaptcha: 300           # was 86400 (24h)
    SearxEngineTooManyRequests: 300   # was 3660 (~1h)
    cf_SearxEngineCaptcha: 600
    cf_SearxEngineAccessDenied: 300
    recaptcha_SearxEngineCaptcha: 600

server:
  secret_key: "OVERRIDDEN_BY_SEARXNG_SECRET_ENV"
  limiter: false
  image_proxy: true
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true
  default_theme: simple
  theme_args:
    simple_style: dark

engines:
  # Multiple general engines enabled so no single engine is a point of failure.
  # When one gets rate-limited/suspended (e.g. Google after a burst), the others
  # keep results flowing. Engine reliability drifts over time — re-test with
  # `&engines=<name>` if one starts failing and flip disabled accordingly.
  - name: google
    engine: google
    shortcut: g
    disabled: false

  # DuckDuckGo: reliable from this host again; returns highly relevant results.
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  # Bing: reliable fallback; broad coverage.
  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp

  - name: github
    engine: github
    shortcut: gh

  # --- Disabled: currently CAPTCHA / access-deny this host's datacenter IP. ---
  # Reachable via !bang if ever needed; re-enable if they recover.
  - name: brave
    engine: brave
    shortcut: br
    disabled: true

  - name: mojeek
    engine: mojeek
    shortcut: mjk
    disabled: true

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
  retries: 2
  pool_connections: 100
  pool_maxsize: 20
