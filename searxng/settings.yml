use_default_settings: true

general:
  instance_name: "BetaMax Search"
  debug: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  # Retry across engines within a single search before giving up — improves
  # resilience when an engine transiently 403s / CAPTCHAs.
  max_page: 0
  formats:
    - html
    - json
  # Recover suspended engines FAST. Defaults suspend an engine for ~1h on 429
  # and 24h on CAPTCHA/access-denied — which, with few enabled engines, causes
  # total failure after a burst (e.g. extended_research fan-out). Shorten these
  # so a transient block doesn't take an engine offline for the whole session.
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 300      # was 86400 (24h)
    SearxEngineCaptcha: 300           # was 86400 (24h)
    SearxEngineTooManyRequests: 300   # was 3660 (~1h)
    cf_SearxEngineCaptcha: 600
    cf_SearxEngineAccessDenied: 300
    recaptcha_SearxEngineCaptcha: 600

server:
  secret_key: "OVERRIDDEN_BY_SEARXNG_SECRET_ENV"
  limiter: false
  image_proxy: true
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true
  default_theme: simple
  theme_args:
    simple_style: dark

engines:
  # ALL rotation engines are enabled here so the front-door ROUTER can target
  # any subset per-query via the `engines=` API param. The router owns the
  # rotation policy (per-engine token buckets + index-family hot-spares), NOT
  # SearXNG's defaults — it sends google-quality via startpage when google is
  # spent, bing-quality via duckduckgo/yahoo when bing is spent, etc. so no
  # single engine endpoint gets suspended.
  #
  # Index families (router groups these):
  #   google-family : google, startpage   (startpage proxies Google's index)
  #   bing-family   : bing, duckduckgo, yahoo   (all serve Bing's index)
  #   brave         : brave                (independent)
  #   independents  : yandex, qwant, mojeek     (own indexes, rotated)
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: yandex
    engine: yandex
    shortcut: yx
    disabled: false

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mjk
    disabled: false

  # Encyclopedic/structured — NOT general web. Disabled for web search because
  # they inject low-yield/off-topic "trash" results (Wikidata entities, etc.).
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: true

  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: true

  - name: github
    engine: github
    shortcut: gh
    disabled: true

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
  retries: 2
  pool_connections: 100
  pool_maxsize: 20
