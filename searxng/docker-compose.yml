services:
  # Primary — DIRECT connection (fast path, preferred by the router).
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8890:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:8890/}
      - SEARXNG_SECRET=${SEARXNG_SECRET:?set SEARXNG_SECRET in .env}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  # Secondary — routes engine traffic through the rotating proxy pool
  # (settings.proxied.yml managed block). Used by the router as tier-2 spillover
  # when the direct instance is saturated or rate-limited.
  searxng-proxied:
    image: searxng/searxng:latest
    container_name: searxng-proxied
    restart: unless-stopped
    ports:
      - "127.0.0.1:8891:8080"
    volumes:
      - ./settings.proxied.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8891/
      - SEARXNG_SECRET=${SEARXNG_SECRET:?set SEARXNG_SECRET in .env}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
